<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoloLedger 独账 — 一人公司的智能账本</title>
  <!-- PR-D: Tailwind, Font Awesome and github-markdown-css are now bundled at build
       time (see index.tsx CSS imports + tailwind.config.ts, which derives the brand
       tokens from components/theme.ts). No runtime CDN — works fully offline. -->
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <style>
    /* PR-D: Inter is self-hosted via @fontsource/inter (imported in index.tsx). */
    body {
      font-family: 'Inter', "Microsoft YaHei", "PingFang SC", sans-serif;
      /* Faint deep-blue gradient so Liquid Glass panels have depth to blur over (icon "微渐变") */
      background-color: #f6f8fd;
      background-image:
        radial-gradient(1200px 600px at 72% -12%, rgba(39, 76, 146, 0.07), transparent 60%),
        radial-gradient(900px 520px at -12% 112%, rgba(39, 76, 146, 0.05), transparent 55%);
      background-attachment: fixed;
      color: #1a1a19;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.02);
      border-radius: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.18);
    }

  </style>
  <!-- PR-D: react / react-dom / recharts are bundled by Vite; the old module-CDN
       import map was dead code (the built chunk never referenced it). index.css is
       imported from index.tsx, so no manual <link> is needed. -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
