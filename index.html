<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Dashboard 智能经营看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown-light.min.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', "Microsoft YaHei", "PingFang SC", sans-serif;
      background-color: #ffffff;
      color: #1a1a19;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.02);
      border-radius: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.18);
    }

    /* Anthropic accent utilities */
    .text-accent {
      color: #d97757;
    }

    .bg-accent {
      background-color: #d97757;
    }

    .bg-accent-hover:hover {
      background-color: #c4694d;
    }

    .border-accent {
      border-color: #d97757;
    }

    .shadow-accent {
      box-shadow: 0 4px 24px rgba(217, 119, 87, 0.15);
    }

    .ring-accent {
      --tw-ring-color: rgba(217, 119, 87, 0.3);
    }
  </style>

    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",

}
</script>

</head>
