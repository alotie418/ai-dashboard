# SoloLedger CI —— §2B：让 20+ 个 check:* 守卫 + 迁移测试 + e2e 在每次推送/PR 自动跑，
# 不再只靠人工。全程不启动 Electron：
#   - 守卫与迁移测试在 node 下跑；better-sqlite3 重建为 node ABI 供迁移测试用真引擎。
#   - e2e 由 Playwright 驱动 vite preview（electronAPI 被 mock），同样不需要 Electron 运行时。
# 故用 `npm ci --ignore-scripts` 跳过 postinstall（electron-builder install-app-deps 会把
# better-sqlite3 重建为 Electron ABI，CI 不需要）。

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Guards + migrations + build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # --ignore-scripts 跳过了 electron 自身的 install（下载二进制）；多个守卫 + 迁移测试
      # 会 require('electron')（仅取路径字符串），二进制缺失会抛「Electron failed to install
      # correctly」。npm rebuild electron 补下二进制；同时把 better-sqlite3 重建为 node ABI
      # 供迁移测试在 node 下跑真引擎。两者都不触发 electron-builder install-app-deps。
      - name: Install Electron binary + rebuild better-sqlite3 for node ABI
        run: npm rebuild electron better-sqlite3
      # 前端构建放在守卫之前：check:offline 需要扫 dist/index.html。
      - name: Build renderer
        run: npm run build
      # 类型检查门禁（tsc --noEmit）：vite/esbuild 编译不做类型检查，这里补上。
      # 纯类型检查，无原生/浏览器/ABI 依赖；放在 build 之后、check:all 之前。
      - name: Typecheck
        run: npm run typecheck
      - name: Run all guards + migration test
        run: npm run check:all
      # Native SwiftUI Core package: unit + guard tests. Includes the schema-version
      # parity guard, which reads Electron's authoritative SCHEMA_VERSION via `node`
      # (set up above) — so native/Electron schema drift fails the PR here. macos-latest
      # ships Xcode, so `swift test` has XCTest without a DEVELOPER_DIR override.
      - name: Native SwiftUI Core tests (swift test)
        run: swift test --package-path native/SoloLedger

  e2e:
    name: Locale-matrix e2e (Playwright)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install Playwright Chromium
        run: npx playwright install chromium
      - name: Build + e2e
        run: npm run test:locale-ui

  # 真 Electron e2e（PR-1 #176 documents fs 分支 + PR-2 #177 attachment IPC）。
  # 仅 workflow_dispatch 手动触发：push/PR 一律不跑、永不作为 merge 门、不入 required checks。
  #   - 与 checks/e2e 两 job 不同，这里要 Electron 二进制 + better-sqlite3 的 ELECTRON ABI
  #     （checks 用的是 node ABI，二者互斥，故必须独立 job）。
  #   - macOS runner 计费 10×，且历史上遇过 spending-limit 阻断，故先手动起步（PR-A）。
  #     待手动跑通且 billing 稳定，再放宽到 push:[main] / PR label（后续 PR-B/PR-C）。
  electron-e2e:
    name: Electron e2e (real main process)
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # --ignore-scripts 跳过了 electron 二进制下载 + postinstall 的原生重建。
      # test:electron 在真 Electron 进程内跑，需要：Electron 二进制 + better-sqlite3 的
      # ELECTRON ABI（npm run electron:rebuild = electron-rebuild -f -w better-sqlite3）。
      # 不需要 chromium、也不需要 build（test:electron 既不进浏览器也不读 dist）。
      - name: Install Electron binary
        run: npm rebuild electron
      - name: Rebuild better-sqlite3 for Electron ABI
        run: npm run electron:rebuild
      - name: Run real-Electron e2e
        run: npm run test:electron
