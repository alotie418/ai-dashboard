# electron-builder 配置 —— 本地自用未签名 macOS DMG（不上架 / 不公证 / 不自动更新）。
# 用法：npm run build:dmg （= BUILD_TARGET=dmg vite build && electron-builder --mac dmg --config 本文件）
# 产物：release/SoloLedger-<version>-arm64.dmg
appId: com.alotie418.sololedger
productName: SoloLedger
copyright: © 2026 SoloLedger

directories:
  output: release          # 产物输出目录
  buildResources: build    # 图标等构建资源

# 进包内容：vite 构建的渲染端 + 主进程/preload/handlers/ai/db + package.json。
# dependencies 由 electron-builder 自动纳入 node_modules（devDependencies 不进包）。
files:
  - dist/**
  - electron/**
  - package.json
  - "!**/*.{map,md}"

# 原生模块（.node）必须从 asar 解包，否则运行时无法加载。
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  # @napi-rs/canvas（经 pdfjs-dist 间接依赖，含 skia.*.node）—— PDF 报表渲染所需。
  # 显式解包，避免仅依赖 electron-builder 自动探测（依赖布局变动时可能失效，导致打包后 PDF 渲染崩）。
  - "**/node_modules/@napi-rs/**"

mac:
  category: public.app-category.finance
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64          # Apple Silicon；要兼容 Intel 改 universal
  identity: null           # 不签名（本地自用）；首次启动需右键→打开过 Gatekeeper
  hardenedRuntime: false   # 未签名/不公证，无需硬化运行时

dmg:
  title: SoloLedger ${version}
