# electron-builder 配置 —— macOS DMG（签名/公证已接线，PR-B；不自动更新）。
# 凭证在场时（钥匙串有 Developer ID Application 证书 + APPLE_ID /
# APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 三个环境变量）产出「签名 + 公证 + staple」
# 的分发级 DMG；无凭证时应降级为未签名构建（探测不到证书 → 跳过签名 → 跳过公证），
# 本地开发照旧可用。执行 runbook 与验证命令见 docs/RELEASE.md。
# 用法：npm run build:dmg （= npm run build && electron-builder --mac dmg --config 本文件）
# 产物：release/SoloLedger-<version>-arm64.dmg
appId: com.alotie418.sololedger
productName: SoloLedger
copyright: © 2026 alotie418

# 不做自动更新：electron-updater 未安装、零引用。显式 publish:null 关闭 electron-builder
# 默认行为——它会从 git remote 推断 GitHub provider，生成误导性的 release/latest-mac.yml
# 与包内 app-update.yml 更新源（指向内部仓库，实则没有可用的更新通道）。
publish: null

directories:
  output: release          # 产物输出目录
  buildResources: build    # 图标等构建资源

# 进包内容：vite 构建的渲染端 + 主进程/preload/handlers/ai/db + package.json。
# dependencies 由 electron-builder 自动纳入 node_modules（devDependencies 不进包）。
files:
  - dist/**
  - electron/**
  - package.json
  - "!**/*.{map,md}"

# 原生模块（.node）必须从 asar 解包，否则运行时无法加载。
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  # @napi-rs/canvas（经 pdfjs-dist 间接依赖，含 skia.*.node）—— PDF 报表渲染所需。
  # 显式解包，避免仅依赖 electron-builder 自动探测（依赖布局变动时可能失效，导致打包后 PDF 渲染崩）。
  - "**/node_modules/@napi-rs/**"

mac:
  category: public.app-category.finance
  icon: build/icon.icns
  target:
    - target: dmg
      arch: arm64          # Apple Silicon；要兼容 Intel 改 universal（签名/公证流程不受影响）
  # identity 不写 → electron-builder 自动探测钥匙串里的 Developer ID Application 证书；
  # 探测不到（机器上无证书）则跳过签名，降级为未签名构建（行为同旧 identity:null）。
  hardenedRuntime: true    # 公证硬前提（Hardened Runtime）
  gatekeeperAssess: false  # 构建期跳过本地 spctl 评估（公证完成之前必失败，评估留给 PR-C 验证步）
  entitlements: build/entitlements.mac.plist        # 最小集：仅 V8 JIT 两项（见该文件内注释）
  entitlementsInherit: build/entitlements.mac.plist
  # 公证凭证绝不写进本文件：electron-builder 从 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID 环境变量读取（见 docs/RELEASE.md §2）。
  notarize: true

dmg:
  title: SoloLedger ${version}
