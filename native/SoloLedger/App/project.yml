# XcodeGen spec for the native SoloLedger macOS app (Phase 1.5).
#
# Generates SoloLedger.xcodeproj with an App target + Unit-Test + UI-Test targets.
# The existing SwiftPM package (../Package.swift) is referenced as a LOCAL package
# so `SoloLedgerCore` is linked without copying source. The app target compiles the
# existing SwiftUI sources in ../Sources/SoloLedger (also not copied).
#
# Regenerate after editing this file:  cd native/SoloLedger/App && xcodegen generate
name: SoloLedger

options:
  bundleIdPrefix: com.alotie418
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    # Local ad-hoc signing only — no Developer ID / team, no production certs.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

packages:
  SoloLedgerPackage:
    path: ".."

targets:
  SoloLedger:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ../Sources/SoloLedger        # existing SwiftUI app code (referenced, not copied)
      - path: Support/Assets.xcassets
    dependencies:
      - package: SoloLedgerPackage
        product: SoloLedgerCore            # link the local Core library, no source copy
    settings:
      base:
        PRODUCT_NAME: SoloLedger
        PRODUCT_BUNDLE_IDENTIFIER: com.alotie418.sololedger.dev   # Debug (dev)
        INFOPLIST_FILE: Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Support/SoloLedger-Debug.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          ENABLE_TESTABILITY: YES   # allow `@testable import SoloLedger` from the hosted unit tests
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.alotie418.sololedger            # Release (production id)
          CODE_SIGN_ENTITLEMENTS: Support/SoloLedger.entitlements

  SoloLedgerUnitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/SoloLedgerUnitTests
      # The SAME committed real-Electron fixture the SwiftPM Core tests bundle (referenced,
      # not copied) — the N7.0 App-hosted production-open tests read it from the test bundle
      # because the sandboxed test host cannot read arbitrary repo paths.
      - path: ../Tests/SoloLedgerCoreTests/Fixtures/electron-v23.db
        buildPhase: resources
    dependencies:
      # Host the app so tests can `@testable import SoloLedger` (XcodeGen wires TEST_HOST +
      # BUNDLE_LOADER from this application dependency).
      - target: SoloLedger
      - package: SoloLedgerPackage
        product: SoloLedgerCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alotie418.sololedger.UnitTests
        GENERATE_INFOPLIST_FILE: YES

  SoloLedgerUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests/SoloLedgerUITests
    dependencies:
      - target: SoloLedger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alotie418.sololedger.UITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SoloLedger:
    build:
      targets:
        SoloLedger: all
        SoloLedgerUnitTests: [test]
        SoloLedgerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - SoloLedgerUnitTests
        - SoloLedgerUITests
    archive:
      config: Debug
